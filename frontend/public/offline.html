<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <title>Money Vault - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #059669, #047857);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 360px;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: rgba(255,255,255,0.15);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }
      h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 15px; line-height: 1.5; opacity: 0.85; margin-bottom: 32px; }
      button {
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        backdrop-filter: blur(8px);
      }
      button:hover { background: rgba(255,255,255,0.3); }
      button:focus { outline: 2px solid rgba(255,255,255,0.6); outline-offset: 2px; }
      @media (prefers-color-scheme: dark) {
        body { background: linear-gradient(135deg, #065f46, #064e3b); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#x1F4B0;</div>
      <h1>You're Offline</h1>
      <p>Money Vault needs an internet connection to load. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
